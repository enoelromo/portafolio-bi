<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <rect width="800" height="420" rx="12" fill="#0b1020"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="180" height="420" rx="12" fill="#0e1529"/>
  <rect x="16" y="20" width="148" height="32" rx="8" fill="#1c2745"/>
  <text x="48" y="42" font-family="system-ui" font-size="14" font-weight="700" fill="#8affc1">Olivovilo</text>
  <rect x="16" y="72" width="148" height="36" rx="8" fill="#1a3a5c"/>
  <text x="40" y="96" font-family="system-ui" font-size="12" fill="#4bb7ff">Dashboard</text>
  <rect x="16" y="116" width="148" height="36" rx="8" fill="transparent"/>
  <text x="40" y="140" font-family="system-ui" font-size="12" fill="#a8b1c7">Empleados</text>
  <rect x="16" y="160" width="148" height="36" rx="8" fill="transparent"/>
  <text x="40" y="184" font-family="system-ui" font-size="12" fill="#a8b1c7">Nomina</text>
  <rect x="16" y="204" width="148" height="36" rx="8" fill="transparent"/>
  <text x="40" y="228" font-family="system-ui" font-size="12" fill="#a8b1c7">Gastos</text>
  <rect x="16" y="248" width="148" height="36" rx="8" fill="transparent"/>
  <text x="40" y="272" font-family="system-ui" font-size="12" fill="#a8b1c7">Reportes</text>

  <!-- Main content -->
  <!-- KPI Cards -->
  <rect x="200" y="20" width="140" height="80" rx="10" fill="#11172b" stroke="#1c2745" stroke-width="1"/>
  <text x="216" y="46" font-family="system-ui" font-size="11" fill="#a8b1c7">Empleados</text>
  <text x="216" y="78" font-family="system-ui" font-size="28" font-weight="700" fill="#4bb7ff">24</text>

  <rect x="356" y="20" width="140" height="80" rx="10" fill="#11172b" stroke="#1c2745" stroke-width="1"/>
  <text x="372" y="46" font-family="system-ui" font-size="11" fill="#a8b1c7">Nomina mensual</text>
  <text x="372" y="78" font-family="system-ui" font-size="28" font-weight="700" fill="#8affc1">$18,450</text>

  <rect x="512" y="20" width="140" height="80" rx="10" fill="#11172b" stroke="#1c2745" stroke-width="1"/>
  <text x="528" y="46" font-family="system-ui" font-size="11" fill="#a8b1c7">Gastos mes</text>
  <text x="528" y="78" font-family="system-ui" font-size="28" font-weight="700" fill="#ff6b6b">$3,280</text>

  <rect x="668" y="20" width="112" height="80" rx="10" fill="#11172b" stroke="#1c2745" stroke-width="1"/>
  <text x="684" y="46" font-family="system-ui" font-size="11" fill="#a8b1c7">Pendientes</text>
  <text x="684" y="78" font-family="system-ui" font-size="28" font-weight="700" fill="#ffd93d">3</text>

  <!-- Chart area -->
  <rect x="200" y="116" width="380" height="200" rx="10" fill="#11172b" stroke="#1c2745" stroke-width="1"/>
  <text x="216" y="142" font-family="system-ui" font-size="12" font-weight="600" fill="#e8edf7">Nomina por departamento</text>
  <!-- Bar chart -->
  <rect x="240" y="280" width="40" height="0" fill="#4bb7ff" rx="4"><animate attributeName="height" from="0" to="120" dur="0.8s" fill="freeze"/><animate attributeName="y" from="280" to="160" dur="0.8s" fill="freeze"/></rect>
  <text x="245" y="298" font-family="system-ui" font-size="9" fill="#a8b1c7">Admin</text>
  <rect x="300" y="280" width="40" height="0" fill="#8affc1" rx="4"><animate attributeName="height" from="0" to="90" dur="0.8s" fill="freeze"/><animate attributeName="y" from="280" to="190" dur="0.8s" fill="freeze"/></rect>
  <text x="305" y="298" font-family="system-ui" font-size="9" fill="#a8b1c7">Ventas</text>
  <rect x="360" y="280" width="40" height="0" fill="#4bb7ff" rx="4"><animate attributeName="height" from="0" to="150" dur="0.8s" fill="freeze"/><animate attributeName="y" from="280" to="130" dur="0.8s" fill="freeze"/></rect>
  <text x="368" y="298" font-family="system-ui" font-size="9" fill="#a8b1c7">Ops</text>
  <rect x="420" y="280" width="40" height="0" fill="#8affc1" rx="4"><animate attributeName="height" from="0" to="60" dur="0.8s" fill="freeze"/><animate attributeName="y" from="280" to="220" dur="0.8s" fill="freeze"/></rect>
  <text x="432" y="298" font-family="system-ui" font-size="9" fill="#a8b1c7">TI</text>
  <rect x="480" y="280" width="40" height="0" fill="#4bb7ff" rx="4"><animate attributeName="height" from="0" to="80" dur="0.8s" fill="freeze"/><animate attributeName="y" from="280" to="200" dur="0.8s" fill="freeze"/></rect>
  <text x="485" y="298" font-family="system-ui" font-size="9" fill="#a8b1c7">RRHH</text>

  <!-- Recent activity -->
  <rect x="596" y="116" width="184" height="200" rx="10" fill="#11172b" stroke="#1c2745" stroke-width="1"/>
  <text x="612" y="142" font-family="system-ui" font-size="12" font-weight="600" fill="#e8edf7">Actividad reciente</text>
  <circle cx="620" cy="166" r="4" fill="#8affc1"/><text x="632" y="170" font-family="system-ui" font-size="10" fill="#a8b1c7">Rol generado</text>
  <circle cx="620" cy="190" r="4" fill="#4bb7ff"/><text x="632" y="194" font-family="system-ui" font-size="10" fill="#a8b1c7">Pago registrado</text>
  <circle cx="620" cy="214" r="4" fill="#ffd93d"/><text x="632" y="218" font-family="system-ui" font-size="10" fill="#a8b1c7">Gasto pendiente</text>
  <circle cx="620" cy="238" r="4" fill="#8affc1"/><text x="632" y="242" font-family="system-ui" font-size="10" fill="#a8b1c7">Empleado nuevo</text>
  <circle cx="620" cy="262" r="4" fill="#4bb7ff"/><text x="632" y="266" font-family="system-ui" font-size="10" fill="#a8b1c7">Decimo calculado</text>

  <!-- Bottom table -->
  <rect x="200" y="332" width="580" height="76" rx="10" fill="#11172b" stroke="#1c2745" stroke-width="1"/>
  <text x="216" y="354" font-family="system-ui" font-size="12" font-weight="600" fill="#e8edf7">Ultimos roles de pago</text>
  <text x="216" y="376" font-family="system-ui" font-size="10" fill="#a8b1c7">Maria Lopez</text>
  <text x="400" y="376" font-family="system-ui" font-size="10" fill="#8affc1">$1,240.00</text>
  <text x="540" y="376" font-family="system-ui" font-size="10" fill="#8affc1">Pagado</text>
  <text x="216" y="396" font-family="system-ui" font-size="10" fill="#a8b1c7">Carlos Mendez</text>
  <text x="400" y="396" font-family="system-ui" font-size="10" fill="#ffd93d">$980.50</text>
  <text x="540" y="396" font-family="system-ui" font-size="10" fill="#ffd93d">Pendiente</text>
</svg>
