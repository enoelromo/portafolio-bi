  <text x="430" y="316" font-family="system-ui" font-size="12" font-weight="700" fill="#ff6b6b">Total egresos</text>
  <text x="740" y="316" font-family="system-ui" font-size="14" font-weight="700" fill="#ff6b6b" text-anchor="end">$363.40</text>

