  <text x="500" y="142" font-family="system-ui" font-size="10" fill="#a8b1c7">USD · EUR</text>
  <!-- Grid lines -->
  <line x1="240" y1="170" x2="560" y2="170" stroke="#1c2745" stroke-width="0.5"/>
  <line x1="240" y1="210" x2="560" y2="210" stroke="#1c2745" stroke-width="0.5"/>
  <line x1="240" y1="250" x2="560" y2="250" stroke="#1c2745" stroke-width="0.5"/>
  <!-- USD line -->
  <polyline points="260,250 310,230 360,210 410,190 460,200 520,180" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
