<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <rect width="800" height="420" rx="12" fill="#0b1020"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="180" height="420" rx="12" fill="#0e1529"/>
  <rect x="16" y="20" width="148" height="32" rx="8" fill="#1c2745"/>
  <text x="52" y="42" font-family="system-ui" font-size="14" font-weight="700" fill="#a78bfa">Floo</text>
  <rect x="16" y="72" width="148" height="36" rx="8" fill="#2d1b69"/>
  <text x="40" y="96" font-family="system-ui" font-size="12" fill="#a78bfa">Dashboard</text>
  <rect x="16" y="116" width="148" height="36" rx="8" fill="transparent"/>
  <text x="40" y="140" font-family="system-ui" font-size="12" fill="#a8b1c7">Transacciones</text>
  <rect x="16" y="160" width="148" height="36" rx="8" fill="transparent"/>
