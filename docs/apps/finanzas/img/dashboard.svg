  <text x="216" y="78" font-family="system-ui" font-size="26" font-weight="700" fill="#a78bfa">$4,285.30</text>

  <rect x="401" y="20" width="185" height="80" rx="10" fill="#11172b" stroke="#1c2745" stroke-width="1"/>
  <text x="417" y="44" font-family="system-ui" font-size="11" fill="#a8b1c7">Ingresos (mar)</text>
  <text x="417" y="78" font-family="system-ui" font-size="26" font-weight="700" fill="#8affc1">+$2,150</text>

  <rect x="602" y="20" width="178" height="80" rx="10" fill="#11172b" stroke="#1c2745" stroke-width="1"/>
