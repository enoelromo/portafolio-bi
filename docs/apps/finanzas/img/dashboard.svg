  <!-- Donut -->
  <circle cx="688" cy="216" r="50" stroke="#2d1b69" stroke-width="14" fill="none" stroke-dasharray="94 220"/>
  <circle cx="688" cy="216" r="50" stroke="#a78bfa" stroke-width="14" fill="none" stroke-dasharray="63 251" stroke-dashoffset="-94"/>
  <circle cx="688" cy="216" r="50" stroke="#8affc1" stroke-width="14" fill="none" stroke-dasharray="47 267" stroke-dashoffset="-157"/>
  <circle cx="688" cy="216" r="50" stroke="#ffd93d" stroke-width="14" fill="none" stroke-dasharray="32 282" stroke-dashoffset="-204"/>
  <circle cx="688" cy="216" r="50" stroke="#ff6b6b" stroke-width="14" fill="none" stroke-dasharray="78 236" stroke-dashoffset="-236"/>
  <text x="674" y="220" font-family="system-ui" font-size="14" font-weight="700" fill="#e8edf7" text-anchor="middle">5</text>
  <text x="674" y="233" font-family="system-ui" font-size="8" fill="#a8b1c7" text-anchor="middle">categorias</text>
  <!-- Legend -->
  <circle cx="624" cy="284" r="4" fill="#2d1b69"/><text x="634" y="288" font-family="system-ui" font-size="9" fill="#a8b1c7">Vivienda 30%</text>
  <circle cx="714" cy="284" r="4" fill="#a78bfa"/><text x="724" y="288" font-family="system-ui" font-size="9" fill="#a8b1c7">Comida 20%</text>
  <circle cx="624" cy="300" r="4" fill="#8affc1"/><text x="634" y="304" font-family="system-ui" font-size="9" fill="#a8b1c7">Transporte 15%</text>

