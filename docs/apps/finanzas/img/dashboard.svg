  <text x="216" y="346" font-family="system-ui" font-size="12" font-weight="600" fill="#e8edf7">Ultimas transacciones</text>
  <text x="216" y="370" font-family="system-ui" font-size="11" fill="#a8b1c7">Carrefour</text>
  <text x="380" y="370" font-family="system-ui" font-size="10" fill="#a8b1c7">Comida</text>
  <text x="520" y="370" font-family="system-ui" font-size="11" fill="#ff6b6b">-€42.30</text>
  <text x="640" y="370" font-family="system-ui" font-size="10" fill="#a8b1c7">Hoy</text>
  <text x="216" y="392" font-family="system-ui" font-size="11" fill="#a8b1c7">Transferencia recibida</text>
  <text x="380" y="392" font-family="system-ui" font-size="10" fill="#a8b1c7">Ingreso</text>
  <text x="520" y="392" font-family="system-ui" font-size="11" fill="#8affc1">+$1,200.00</text>
  <text x="640" y="392" font-family="system-ui" font-size="10" fill="#a8b1c7">Ayer</text>
</svg>
